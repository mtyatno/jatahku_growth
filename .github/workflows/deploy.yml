name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy & Update VPS
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy ke VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== DEPLOY DIMULAI ==="

            cd /home/yatno/jatahku_growth

            # Pull kode terbaru
            git pull origin main

            # Install/update dependencies jika ada yang baru
            pip install -r requirements.txt -q

            echo "=== DEPLOY SELESAI ==="
            echo "Versi terbaru sudah aktif di VPS."
